<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JINHO Korean Talk Tutor</title>
  <link rel="stylesheet" href="style.css?v=talk4" />
</head>
<body class="skin-minecraft">
  <div class="app">
    <header class="topbar">
      <div>
        <div class="brand">K-Talk Tutor</div>
        <div class="subtitle" id="subtitleText">Conversation Korean tutor for JINHO</div>
      </div>
      <div class="top-actions">
        <button class="lang-btn" id="langBtn">한국어</button>
        <div class="streak">
          <span id="streakDays">0</span>
          <small id="streakLabel">streak</small>
        </div>
      </div>
    </header>

    <div class="skin-strip" id="skinStrip"></div>

    <main id="screen">
      <section class="card">
        <h1>Loading...</h1>
      </section>
    </main>

    <nav class="bottom-nav">
      <button id="tab-home" data-tab="home">Home</button>
      <button id="tab-chat" data-tab="chat">Tutor</button>
      <button id="tab-review" data-tab="review">Review</button>
      <button id="tab-record" data-tab="record">Voice</button>
      <button id="tab-profile" data-tab="profile">Profile</button>
    </nav>
  </div>

  <script src="data.js?v=talk4"></script>
  <script src="app.js?v=talk4"></script>
</body>
</html>
